<!DOCTYPE html><html lang="cs"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Sázavik - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#98bc8e",
                    "primary": "#173514",
                    "surface-container-highest": "#ebe2c8",
                    "surface-container-high": "#f1e8cd",
                    "on-primary-fixed": "#032104",
                    "on-tertiary-fixed-variant": "#544600",
                    "on-error": "#ffffff",
                    "tertiary": "#705d00",
                    "surface-container": "#f7eed2",
                    "primary-fixed-dim": "#acd0a1",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed-variant": "#2f4e2a",
                    "error-container": "#ffdad6",
                    "on-background": "#1f1c0b",
                    "on-tertiary-container": "#4c3f00",
                    "secondary-fixed-dim": "#ffb68c",
                    "background": "#fff9ed",
                    "surface": "#fff9ed",
                    "secondary-fixed": "#ffdbc9",
                    "inverse-on-surface": "#faf0d5",
                    "tertiary-fixed": "#ffe16d",
                    "secondary": "#934b19",
                    "surface-container-low": "#fcf3d8",
                    "on-secondary-fixed": "#321200",
                    "on-primary": "#ffffff",
                    "on-secondary-container": "#783603",
                    "on-secondary-fixed-variant": "#753401",
                    "error": "#ba1a1a",
                    "outline": "#73796f",
                    "on-error-container": "#93000a",
                    "primary-container": "#2d4c28",
                    "on-surface-variant": "#434840",
                    "inverse-primary": "#acd0a1",
                    "inverse-surface": "#35301e",
                    "tertiary-fixed-dim": "#e9c400",
                    "tertiary-container": "#c9a900",
                    "primary-fixed": "#c7edbc",
                    "surface-variant": "#ebe2c8",
                    "surface-bright": "#fff9ed",
                    "outline-variant": "#c3c8bd",
                    "on-surface": "#1f1c0b",
                    "surface-tint": "#466640",
                    "on-tertiary-fixed": "#221b00",
                    "surface-dim": "#e2dabf",
                    "secondary-container": "#ffa26a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "edge-margin": "20px",
                    "section-padding": "24px",
                    "stack-gap": "16px"
            },
            "fontFamily": {
                    "headline-sm": ["Bricolage Grotesque"],
                    "headline-md": ["Bricolage Grotesque"],
                    "display-lg": ["Bricolage Grotesque"],
                    "label-mono": ["Space Mono"],

            },
            "fontSize": {

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom rough borders to simulate tactile hand-drawn feel */
        .rough-border {
            border: 3px solid #1f1c0b; /* on-background */
            border-radius: 4px 8px 3px 6px;
        }
        .rough-input {
            border-bottom: 3px solid #1f1c0b;
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen relative flex items-center justify-center overflow-x-hidden selection:bg-tertiary-fixed selection:text-on-tertiary-fixed bg-parchment"><div class="absolute bottom-20 right-[-30px] opacity-20 rotate-12 pointer-events-none"><span class="material-symbols-outlined text-[100px]">sailing</span></div><div class="absolute top-10 left-[-20px] opacity-20 -rotate-12 pointer-events-none"><span class="material-symbols-outlined text-[120px]">map</span></div>
<!-- Texture Background Image -->

<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-edge-margin py-section-padding flex flex-col items-center">
<!-- Header / Logo Area (Adapted from TopAppBar styling but scaled for splash) -->
<div class="mb-10 flex flex-col items-center justify-center transform -rotate-2">
<span class="material-symbols-outlined text-6xl text-primary mb-2" data-weight="fill">skull</span>
<h1 class="font-display-lg text-display-lg text-primary uppercase tracking-tighter drop-shadow-[3px_3px_0px_#acd0a1]">
                SÁZAVIK
            </h1>
</div>
<!-- Greeting Card / "Wooden Plank" -->
<div class="bg-surface-container-high rough-border p-section-padding w-full mb-8 shadow-[6px_6px_0px_0px_#1f1c0b] transform rotate-1 relative">
<!-- Decorative pin -->
<div class="absolute -top-3 left-1/2 -translate-x-1/2 w-6 h-6 rounded-full bg-secondary shadow-inner flex items-center justify-center border-2 border-on-background">
<div class="w-2 h-2 rounded-full bg-on-background/50"></div>
</div>
<h2 class="font-headline-md text-headline-md text-center text-on-surface mb-6">
                Vítej na palubě, piráte!
            </h2>
<!-- Form -->
<form action="#" class="flex flex-col gap-stack-gap w-full" method="POST" onsubmit="event.preventDefault();">
<!-- Username Input (Fill-in-the-blank style) -->
<div class="flex flex-col group relative">
<label class="font-label-mono text-label-mono text-on-surface-variant mb-1 flex items-center gap-2" for="username">
<span class="material-symbols-outlined text-sm">anchor</span>
                        Jméno piráta
                    </label>
<input class="bg-transparent rough-input px-2 py-3 font-label-mono text-label-mono text-primary outline-none focus:border-tertiary transition-colors w-full placeholder:text-outline-variant placeholder:font-body-md" id="username" name="username" placeholder="Tvůj slavný pseudonym..." required="" type="text">
</div>
<!-- Password Input -->
<div class="flex flex-col group relative mt-4">
<label class="font-label-mono text-label-mono text-on-surface-variant mb-1 flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-sm">key</span>
                        Heslo k pokladu
                    </label>
<input class="bg-transparent rough-input px-2 py-3 font-label-mono text-label-mono text-primary outline-none focus:border-tertiary transition-colors w-full placeholder:text-outline-variant placeholder:font-body-md tracking-widest" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
<!-- Primary Action Button (The "Patch") -->
<button class="mt-8 bg-tertiary-fixed text-on-tertiary-fixed font-headline-sm text-headline-sm py-4 px-6 rough-border shadow-[4px_4px_0px_0px_#1f1c0b] hover:translate-y-1 hover:translate-x-1 hover:shadow-[0px_0px_0px_0px_#1f1c0b] transition-all active:bg-tertiary-fixed-dim border-dashed relative overflow-hidden group" type="submit">
<div class="absolute inset-0 bg-white/20 transform -translate-x-full group-hover:translate-x-full transition-transform duration-500 ease-in-out"></div>
<span class="relative z-10 flex items-center justify-center gap-2">
                        Vstoupit na loď
                        <span class="material-symbols-outlined">explore</span>
</span>
</button>
</form>
</div>
<!-- Secondary Link -->
<div class="mt-4 transform rotate-1">
<a class="font-label-mono text-label-mono text-secondary hover:text-primary transition-colors underline decoration-2 underline-offset-4 decoration-secondary/50 hover:decoration-primary flex items-center gap-2 bg-surface-container px-4 py-2 rounded border-2 border-transparent hover:border-outline-variant" href="#">
                Ještě nemám loď? Registrovat se
            </a>
</div>
</main>


</body></html>
